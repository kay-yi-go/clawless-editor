name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  desktop:
    name: Desktop (Tauri + React)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: cargo check
        working-directory: apps/desktop/src-tauri

  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: uv sync --all-extras

      - name: Syntax check
        run: |
          uv run python -m py_compile \
            clawless_backend/__init__.py \
            clawless_backend/main.py \
            clawless_backend/config.py \
            clawless_backend/auth.py \
            clawless_backend/llm.py \
            clawless_backend/daily.py \
            clawless_backend/rename.py \
            clawless_backend/archive.py

      - name: Lint
        run: uv run ruff check .
        continue-on-error: true
