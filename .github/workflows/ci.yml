name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  desktop:
    name: Desktop (Tauri + React)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Prettier (format check)
        run: pnpm format:check

      - name: ESLint
        run: pnpm lint

      - name: TypeScript + Vite build
        run: pnpm build

      - name: Cargo fmt
        run: cargo fmt --check
        working-directory: apps/desktop/src-tauri

      - name: Clippy (warnings as errors)
        run: cargo clippy --all-targets -- -D warnings
        working-directory: apps/desktop/src-tauri

      - name: Cargo check
        run: cargo check --all-targets
        working-directory: apps/desktop/src-tauri

  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/backend
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: services/backend/uv.lock

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: uv sync --all-extras

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format check)
        run: uv run ruff format --check .

      - name: Syntax check
        run: |
          uv run python -m py_compile \
            clawless_backend/__init__.py \
            clawless_backend/main.py \
            clawless_backend/config.py \
            clawless_backend/auth.py \
            clawless_backend/llm.py \
            clawless_backend/daily.py \
            clawless_backend/rename.py \
            clawless_backend/archive.py
